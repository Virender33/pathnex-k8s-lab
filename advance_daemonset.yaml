apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: pathnex-monitor-daemonset
  namespace: pathnex-monitoring
spec:
  selector:
    matchLabels:
      app: pathnex-monitor
  template:
    metadata:
      labels:
        app: pathnex-monitor
    spec:
      tolerations:
      - operator: "Exists"

      containers:
      - name: node-exporter
        image: prom/node-exporter
        ports:
        - containerPort: 9100

        resources:
          requests:
            cpu: "100m"
            memory: "100Mi"
          limits:
            cpu: "200m"
            memory: "200Mi"
