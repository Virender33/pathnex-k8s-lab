---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pathnex-db-statefulset
  namespace: pathnex-data
spec:
  serviceName: pathnex-db-service
  replicas: 2
  selector:
    matchLabels:
      app: pathnex-db
  template:
    metadata:
      labels:
        app: pathnex-db
    spec:
      containers:
      - name: redis
        image: redis
        ports:
        - containerPort: 6379